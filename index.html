<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>JR · Lumina Planner</title>
<meta name="theme-color" content="#0A1931">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lumina">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ────────────────────────────────────────────── */
:root {
  --abyss:       #0A1931;
  --abyss-mid:   #112d55;
  --abyss-light: #163a6e;
  --gold:        #D4AF37;
  --gold-dim:    rgba(212,175,55,0.14);
  --gold-mid:    rgba(212,175,55,0.30);
  --gold-glow:   rgba(212,175,55,0.55);
  --cyan:        #7DF9FF;
  --cyan-dim:    rgba(125,249,255,0.10);
  --cyan-mid:    rgba(125,249,255,0.28);
  --cyan-glow:   rgba(125,249,255,0.50);
  --cyan-bright: #A8FBFF;
  --emerald:     #28A745;
  --em-dim:      rgba(40,167,69,0.15);
  --parchment:   #F5F5DC;
  --parch-dim:   rgba(245,245,220,0.80);
  --parch-muted: rgba(245,245,220,0.55);
  --parch-faint: rgba(245,245,220,0.22);
  --glass:       rgba(18,45,85,0.62);
  --gb-gold:     rgba(212,175,55,0.18);
  --gb-cyan:     rgba(125,249,255,0.12);
  --danger:      #EF4444;
  --danger-dim:  rgba(239,68,68,0.14);
  --violet:      #C080E0;
  --violet-dim:  rgba(192,128,224,0.14);
  --tab-bg:      rgba(7,16,36,0.97);
  --tab-border:  rgba(125,249,255,0.09);
}

/* ── RESET ─────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{
  font-family:'Outfit',sans-serif;color:var(--parchment);
  min-height:100vh;max-width:480px;margin:0 auto;
  overflow-x:hidden;position:relative;
  background:radial-gradient(ellipse at 35% 20%,var(--abyss-light) 0%,var(--abyss-mid) 44%,var(--abyss) 100%);
}
::-webkit-scrollbar{width:0}
input,textarea,button{font-family:'Outfit',sans-serif}
input::placeholder,textarea::placeholder{color:var(--parch-faint)}
button{cursor:pointer}

/* ── MOTES ─────────────────────────────────────────────── */
.mote{position:fixed;width:3px;height:3px;border-radius:50%;pointer-events:none;z-index:0;opacity:0.4}
@keyframes m1{0%{transform:translate(0,0)}25%{transform:translate(30px,-20px)}50%{transform:translate(-10px,-42px)}75%{transform:translate(-30px,-15px)}100%{transform:translate(0,0)}}
@keyframes m2{0%{transform:translate(0,0)}33%{transform:translate(-25px,18px)}66%{transform:translate(22px,-26px)}100%{transform:translate(0,0)}}
@keyframes m3{0%{transform:translate(0,0)}20%{transform:translate(16px,26px)}60%{transform:translate(-22px,10px)}100%{transform:translate(0,0)}}

/* ── HEADER ────────────────────────────────────────────── */
.header{
  padding:18px 20px 12px;border-bottom:1px solid var(--tab-border);
  position:sticky;top:0;z-index:50;
  background:linear-gradient(180deg,rgba(10,25,49,0.98) 0%,rgba(10,25,49,0.88) 100%);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
}
.header-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.header-title{
  font-family:'Playfair Display',serif;font-size:22px;font-weight:700;
  background:linear-gradient(130deg,var(--gold) 0%,var(--parchment) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.header-date{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--parch-muted)}

/* ── NORTH STAR BANNER ─────────────────────────────────── */
.ns-banner{
  display:none;align-items:center;gap:10px;
  padding:8px 14px;border:1px solid var(--gold-mid);border-radius:10px;
  background:linear-gradient(90deg,rgba(212,175,55,0.10),rgba(212,175,55,0.04));
  cursor:pointer;transition:background 0.2s;
}
.ns-banner.visible{display:flex}
.ns-banner:hover{background:linear-gradient(90deg,rgba(212,175,55,0.18),rgba(212,175,55,0.08))}
.ns-star{font-size:13px;flex-shrink:0;filter:drop-shadow(0 0 4px var(--gold-glow))}
.ns-lbl{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.15em;text-transform:uppercase;color:var(--gold)}
.ns-txt{font-size:13px;color:var(--parch-dim);font-weight:500;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── PANELS ────────────────────────────────────────────── */
.panel{display:none;padding:14px 18px 200px;min-height:60vh;position:relative;z-index:1}
.panel.active{display:block}
#panel-tree{padding:12px 0 90px}

/* ── GLASS ─────────────────────────────────────────────── */
.glass{
  background:var(--glass);border:1px solid var(--gb-gold);border-radius:14px;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  box-shadow:0 2px 12px rgba(0,0,0,0.20);
}

/* ── ITEM CARD (vault) ─────────────────────────────────── */
.item-card{
  background:var(--glass);border:1px solid var(--gb-gold);border-radius:14px;
  padding:14px 16px;margin-bottom:8px;
  display:flex;gap:10px;align-items:flex-start;
  transition:box-shadow 0.2s;
}
.item-card:hover{box-shadow:0 0 18px var(--gold-dim)}
.item-body{flex:1;min-width:0}
.item-text{font-size:15px;line-height:1.5;color:var(--parchment);word-break:break-word;display:flex;align-items:flex-start;gap:8px}
.item-meta{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--parch-muted);margin-top:5px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.item-actions{display:flex;gap:4px;align-items:center;flex-shrink:0}

/* ── GEM CRYSTAL ───────────────────────────────────────── */
.gem-wrap{width:20px;height:22px;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;margin-top:1px}
.gem-wrap svg{width:20px;height:22px;transform-origin:center}
@keyframes gemSpin{
  0%  {transform:rotate(0deg)  scale(1)   ;filter:drop-shadow(0 0 3px rgba(125,249,255,0.55))}
  25% {transform:rotate(90deg) scale(1.08);filter:drop-shadow(0 0 6px rgba(212,175,55,0.65))}
  50% {transform:rotate(180deg)scale(1)   ;filter:drop-shadow(0 0 4px rgba(192,128,224,0.55))}
  75% {transform:rotate(270deg)scale(0.93);filter:drop-shadow(0 0 6px rgba(125,249,255,0.65))}
  100%{transform:rotate(360deg)scale(1)   ;filter:drop-shadow(0 0 3px rgba(125,249,255,0.55))}
}
.gem-wrap svg{animation:gemSpin 5s linear infinite}

/* ── TAG CHIP ──────────────────────────────────────────── */
.tag{
  display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;
  font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.06em;
  border:1px solid;opacity:0.85;white-space:nowrap;
}

/* ── PRIORITY BADGE ────────────────────────────────────── */
.prio-btn{
  border-radius:8px;padding:4px 9px;font-size:10px;font-weight:600;
  text-transform:uppercase;border-width:1px;border-style:solid;
  font-family:'JetBrains Mono',monospace;min-height:30px;letter-spacing:0.04em;
  transition:opacity 0.15s;white-space:nowrap;flex-shrink:0;
}
.prio-btn:active{opacity:0.7}
.p-low {background:var(--em-dim);    border-color:var(--emerald);color:#4ADE80}
.p-med {background:var(--gold-dim);  border-color:var(--gold);   color:#FBBF24}
.p-high{background:var(--danger-dim);border-color:var(--danger); color:#F87171}

/* ── ICON BUTTON ───────────────────────────────────────── */
.ibtn{
  width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  background:none;border:none;color:var(--parch-muted);border-radius:9px;
  transition:color 0.15s,background 0.15s;flex-shrink:0;
}
.ibtn:hover{background:var(--cyan-dim);color:var(--parchment)}
.ibtn.go{background:var(--gold-dim);border:1px solid var(--gold-mid);color:var(--gold)}
.ibtn.go:hover{background:var(--gold-mid)}
.ibtn.del:hover{color:var(--danger)}
.ibtn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* ── PROMO INLINE ──────────────────────────────────────── */
.promo-inline{
  margin-top:10px;padding:10px 12px;
  background:rgba(17,45,85,0.95);border:1px solid var(--cyan-mid);border-radius:10px;
  display:flex;align-items:flex-start;gap:6px;flex-wrap:wrap;
  animation:fadeIn 0.15s ease;
}
.promo-lbl{
  font-family:'JetBrains Mono',monospace;font-size:9px;
  letter-spacing:0.15em;text-transform:uppercase;color:var(--cyan);white-space:nowrap;width:100%;margin-bottom:2px;
}
.promo-opt{
  padding:6px 12px;border-radius:8px;border:1px solid var(--gb-gold);
  background:var(--glass);color:var(--parch-dim);font-size:12px;
  transition:all 0.15s;display:flex;align-items:center;gap:4px;
  font-family:'Outfit',sans-serif;
}
.promo-opt:hover{border-color:var(--cyan);color:var(--cyan)}

/* ── SECTION LABEL ─────────────────────────────────────── */
.slabel{
  display:flex;align-items:center;gap:10px;
  font-family:'JetBrains Mono',monospace;font-size:9px;
  letter-spacing:0.2em;text-transform:uppercase;color:var(--parch-faint);
  padding:14px 0 8px;
}
.slabel::after{content:'';flex:1;height:1px;background:var(--tab-border)}

/* ── WEEK TOGGLE ───────────────────────────────────────── */
.week-toggle{display:flex;gap:6px;margin-bottom:14px}
.week-btn{
  flex:1;padding:10px;border-radius:12px;border:1px solid var(--tab-border);
  background:var(--glass);color:var(--parch-muted);font-size:11px;
  font-family:'JetBrains Mono',monospace;letter-spacing:0.08em;text-transform:uppercase;
  transition:all 0.2s;
}
.week-btn.wk-active{
  border-color:var(--cyan-mid);background:var(--cyan-dim);color:var(--cyan-bright);font-weight:600;
  box-shadow:0 0 14px rgba(125,249,255,0.12);
}

/* ── TASK CARD ─────────────────────────────────────────── */
.task-card{
  background:var(--glass);border:1px solid var(--gb-gold);border-radius:14px;
  padding:12px 14px;margin-bottom:8px;
  display:flex;align-items:flex-start;gap:10px;
  transition:box-shadow 0.2s;
}
.task-card:hover{box-shadow:0 0 14px var(--gold-dim)}
.task-card.is-done{opacity:0.38}
.task-card.is-done .task-text{text-decoration:line-through;color:var(--parch-muted)}
.check-ring{
  width:26px;height:26px;border-radius:7px;flex-shrink:0;margin-top:2px;
  border:2px solid var(--gb-gold);background:none;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;font-size:12px;color:transparent;
}
.check-ring.ticked{background:var(--em-dim);border-color:var(--emerald);color:#4ADE80}
.task-body{flex:1;min-width:0}
.task-text{font-size:14px;line-height:1.45;word-break:break-word}
.task-footer{display:flex;align-items:center;gap:6px;margin-top:6px;flex-wrap:wrap}
.day-pill{
  font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--parch-muted);
  padding:3px 8px;border-radius:6px;border:1px solid var(--tab-border);
  transition:all 0.15s;
}
.day-pill:hover{border-color:var(--gold);color:var(--gold)}
.day-picker{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.day-opt{
  -webkit-appearance:none;appearance:none;
  padding:5px 9px;border-radius:7px;border:1px solid var(--tab-border);
  background:rgba(18,45,85,0.80);color:var(--parch-muted);font-size:10px;
  font-family:'JetBrains Mono',monospace;transition:all 0.15s;
}
.day-opt:hover{border-color:var(--cyan);color:var(--cyan);background:rgba(18,45,85,0.90)}
.day-opt.day-sel{border-color:var(--gold);color:var(--gold);background:var(--gold-dim)}
.day-opt.day-past{opacity:0.38;text-decoration:line-through}

/* ── PROJECT CARD ──────────────────────────────────────── */
.proj-card{
  background:var(--glass);border:1px solid var(--gb-gold);
  border-left:3px solid var(--cyan);border-radius:14px;
  padding:14px 16px;margin-bottom:8px;
  transition:box-shadow 0.2s;
}
.proj-card:hover{box-shadow:0 0 16px var(--cyan-dim)}
.proj-card.is-ns{border-left-color:var(--gold);box-shadow:0 0 22px var(--gold-dim)}
.proj-header{display:flex;align-items:flex-start;gap:8px}
.expand-btn{
  width:22px;height:22px;border-radius:6px;border:none;background:none;
  color:var(--parch-faint);display:flex;align-items:center;justify-content:center;
  font-size:11px;transition:transform 0.22s,color 0.15s;flex-shrink:0;margin-top:2px;
}
.expand-btn.open{transform:rotate(90deg);color:var(--cyan)}
.proj-body{flex:1;min-width:0}
.proj-title{font-size:15px;font-weight:500;line-height:1.4;word-break:break-word}
.proj-meta{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--parch-muted);margin-top:5px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.proj-actions{display:flex;gap:3px;align-items:center;flex-shrink:0}

/* ── PROJECT PROGRESS ──────────────────────────────────── */
.proj-prog{margin-top:10px}
.prog-track{height:2px;background:rgba(125,249,255,0.07);border-radius:2px;overflow:hidden;margin-bottom:4px}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--cyan));border-radius:2px;transition:width 0.4s ease}
.prog-label{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--parch-faint)}

/* ── CHILDREN ──────────────────────────────────────────── */
.children{padding:10px 0 4px 14px;border-left:1px solid var(--tab-border);margin-top:10px}
.child-row{
  display:flex;align-items:center;gap:8px;
  padding:8px 10px;margin-bottom:4px;
  background:rgba(18,45,85,0.38);border-radius:10px;border:1px solid var(--tab-border);
}
.child-text{font-size:13px;flex:1;color:var(--parch-dim);min-width:0;word-break:break-word}
.child-done-text{text-decoration:line-through;color:var(--parch-muted);opacity:0.6}
.child-add-btn{
  display:flex;align-items:center;gap:6px;margin-top:6px;
  padding:8px 10px;border-radius:10px;border:1px dashed var(--tab-border);
  background:none;color:var(--parch-faint);font-size:12px;width:100%;
  transition:border-color 0.15s,color 0.15s;
}
.child-add-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.child-add-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;flex-shrink:0}
.child-input-wrap{margin-top:6px}
.child-input{
  width:100%;background:var(--glass);border:1px solid var(--cyan-mid);
  border-radius:10px;padding:8px 12px;color:var(--parchment);font-size:13px;outline:none;
  font-family:'Outfit',sans-serif;
}

/* ── TREE ──────────────────────────────────────────────── */
.tree-bar{display:flex;justify-content:space-between;align-items:center;padding:0 18px 10px}
.tree-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--parch-faint)}
#tree-svg{width:100%;display:block;touch-action:none}
.tree-legend{padding:10px 18px 0;display:flex;flex-wrap:wrap;gap:8px}
.leg-item{display:flex;align-items:center;gap:5px;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--parch-muted)}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── INPUT BAR ─────────────────────────────────────────── */
.input-bar{
  position:fixed;bottom:68px;left:0;right:0;max-width:480px;margin:0 auto;
  padding:22px 16px 8px;
  background:linear-gradient(transparent,var(--abyss) 44%);
  z-index:40;
}
.input-bar.hidden{display:none}
.input-shell{
  display:flex;gap:5px;align-items:center;
  padding:4px 4px 4px 16px;
  background:var(--glass);border:1px solid var(--gb-gold);
  border-radius:16px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
}
.input-shell input{
  flex:1;background:none;border:none;outline:none;
  color:var(--parchment);font-size:16px;min-height:44px;caret-color:var(--gold);
}
.add-btn{
  width:46px;height:46px;border-radius:11px;border:none;
  display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0;
}
.add-btn.rdy{background:linear-gradient(135deg,var(--gold),#B8941E);box-shadow:0 4px 16px rgba(212,175,55,0.38);color:var(--abyss)}
.add-btn.off{background:var(--cyan-dim);color:var(--cyan);border:1px solid var(--cyan-mid)}
.add-btn.listening{background:var(--danger-dim);border:1px solid rgba(239,68,68,0.4);color:var(--danger);animation:micPulse 1.5s ease-in-out infinite}
.add-btn.no-mic{background:rgba(18,45,85,0.40);color:var(--parch-faint);border:1px solid var(--tab-border)}
.add-btn svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

/* ── MIC ───────────────────────────────────────────────── */
.mic-btn{
  width:46px;height:46px;border-radius:11px;border:none;
  display:none;align-items:center;justify-content:center;
  background:var(--cyan-dim);transition:all 0.2s;flex-shrink:0;
}
.mic-btn.visible{display:flex}
.mic-btn.listening{background:var(--danger-dim);border:1px solid rgba(239,68,68,0.4);animation:micPulse 1.5s ease-in-out infinite}
.mic-btn svg{width:19px;height:19px;stroke:var(--cyan);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.mic-btn.listening svg{stroke:var(--danger)}
@keyframes micPulse{0%,100%{box-shadow:0 0 8px rgba(239,68,68,0.22)}50%{box-shadow:0 0 22px rgba(239,68,68,0.52)}}
.mic-err{
  display:none;position:fixed;bottom:136px;left:50%;transform:translateX(-50%);
  background:rgba(239,68,68,0.14);border:1px solid rgba(239,68,68,0.32);
  border-radius:10px;padding:9px 14px;z-index:100;
  font-size:12px;color:#F87171;max-width:320px;text-align:center;white-space:nowrap;
  animation:fadeIn 0.2s ease;
}
.mic-err.show{display:block}

/* ── TAB BAR ───────────────────────────────────────────── */
.tab-bar{
  position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;
  background:var(--tab-bg);border-top:1px solid var(--tab-border);
  display:flex;padding:4px 4px max(4px,env(safe-area-inset-bottom));
  backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
  z-index:60;gap:2px;
}
.tab-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;padding:5px 4px;border:1px solid transparent;border-radius:13px;
  background:none;min-height:58px;color:var(--parch-muted);
  transition:all 0.22s ease;position:relative;
}
.tab-btn.active{background:var(--cyan-dim);border-color:var(--cyan-mid);color:var(--cyan-bright)}
@keyframes cyanPulse{
  0%,100%{box-shadow:0 0 10px rgba(125,249,255,0.18),inset 0 0 6px rgba(125,249,255,0.06)}
  50%    {box-shadow:0 0 26px rgba(125,249,255,0.42),inset 0 0 10px rgba(125,249,255,0.12)}
}
.tab-btn.active{animation:cyanPulse 2.8s ease-in-out infinite}
.tab-icon{width:26px;height:26px;display:flex;align-items:center;justify-content:center}
.tab-icon svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;transition:stroke 0.22s}
.tab-lbl{font-size:9px;font-family:'JetBrains Mono',monospace;letter-spacing:0.05em;text-transform:uppercase}
.tab-badge{
  position:absolute;top:4px;right:5px;
  background:var(--cyan);color:var(--abyss);
  font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;
  padding:1px 5px;border-radius:10px;min-width:15px;text-align:center;
  box-shadow:0 0 6px var(--cyan-glow);display:none;
}

/* ── EMPTY ─────────────────────────────────────────────── */
.empty{text-align:center;padding:60px 24px}
.empty-icon{font-size:42px;opacity:0.22;margin-bottom:16px}
.empty-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--parch-dim);margin-bottom:8px}
.empty-sub{font-size:13px;color:var(--parch-muted);line-height:1.65}

/* ── NEW DAY MODAL ─────────────────────────────────────── */
#nd-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:200;display:none;align-items:center;justify-content:center;padding:24px}
#nd-overlay.open{display:flex}
@keyframes fsin{from{opacity:0;transform:scale(0.92)}to{opacity:1;transform:scale(1)}}
.nd-card{
  background:var(--abyss-mid);border:1px solid var(--gold-mid);
  border-radius:18px;padding:24px 20px 20px;width:100%;max-width:380px;
  box-shadow:0 0 44px var(--gold-dim);animation:fsin 0.28s ease;
}
.nd-ey{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.22em;text-transform:uppercase;color:var(--gold);margin-bottom:12px}
.nd-body{font-size:15px;font-weight:300;color:var(--parch-muted);line-height:1.6;margin-bottom:16px}
.nd-body strong{color:var(--parchment);font-weight:500}
.nd-stats{display:flex;gap:8px;margin-bottom:18px}
.nd-stat{flex:1;background:rgba(125,249,255,0.03);border-radius:10px;padding:12px 8px 10px;text-align:center;border:1px solid var(--tab-border)}
.nd-n{font-family:'JetBrains Mono',monospace;font-size:26px;color:var(--gold);line-height:1}
.nd-l{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.12em;text-transform:uppercase;color:var(--parch-faint);margin-top:4px}
.nd-btn{width:100%;padding:13px;border-radius:10px;border:none;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;transition:opacity 0.2s}
.nd-btn:active{opacity:0.8}
.nd-primary{background:var(--gold);color:var(--abyss);font-weight:700;box-shadow:0 4px 14px rgba(212,175,55,0.28)}
.nd-secondary{background:rgba(125,249,255,0.04);color:var(--parch-muted);border:1px solid var(--tab-border)}

/* ── NS CONFIRM MODAL ──────────────────────────────────── */
#ns-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:200;display:none;align-items:center;justify-content:center;padding:24px}
#ns-overlay.open{display:flex}
.ns-card{
  background:var(--abyss-mid);border:1px solid var(--gold-mid);
  border-radius:18px;padding:24px 20px;width:100%;max-width:360px;
  box-shadow:0 0 44px var(--gold-dim);animation:fsin 0.28s ease;text-align:center;
}
.ns-card-star{font-size:34px;margin-bottom:12px;filter:drop-shadow(0 0 8px var(--gold-glow))}
.ns-card-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--gold);margin-bottom:8px}
.ns-card-body{font-size:13px;color:var(--parch-muted);line-height:1.6;margin-bottom:18px}
.ns-card-name{color:var(--parchment);font-weight:500}
.ns-btns{display:flex;gap:8px}
.ns-btns button{flex:1;padding:12px;border-radius:10px;border:none;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.1em;text-transform:uppercase}
.ns-do{background:var(--gold);color:var(--abyss);font-weight:700}
.ns-no{background:rgba(125,249,255,0.05);color:var(--parch-muted);border:1px solid var(--tab-border)!important;border:none}

/* ── VAULT CAPTURE BAR ─────────────────────────────────── */
#vault-capture{
  position:fixed;bottom:68px;left:0;right:0;max-width:480px;margin:0 auto;
  flex-direction:column;align-items:center;gap:10px;
  padding:16px 24px 12px;
  background:linear-gradient(transparent,var(--abyss) 50%);
  z-index:40;
}
.vault-mic-row{display:flex;align-items:center;justify-content:center;gap:20px;width:100%}
.vault-big-mic{
  width:88px;height:88px;border-radius:50%;border:none;
  background:linear-gradient(135deg,#B8941E,var(--gold));
  color:var(--abyss);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 28px var(--gold-glow),0 0 56px rgba(212,175,55,0.22),0 4px 20px rgba(0,0,0,0.30);
  transition:transform 0.18s,box-shadow 0.18s;
}
.vault-big-mic:active{transform:scale(0.92)}
.vault-big-mic.listening{
  background:linear-gradient(135deg,#c0392b,var(--danger));
  color:#fff;
  box-shadow:0 0 32px rgba(239,68,68,0.55),0 0 64px rgba(239,68,68,0.22),0 4px 20px rgba(0,0,0,0.30);
  animation:bigMicPulse 1.4s ease-in-out infinite;
}
.vault-kb-btn{
  width:44px;height:44px;border-radius:14px;border:1px solid var(--tab-border);
  background:var(--glass);color:var(--parch-muted);
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  transition:all 0.15s;
}
.vault-kb-btn.active{border-color:var(--cyan-mid);color:var(--cyan);background:var(--cyan-dim)}
.vault-type-wrap{
  width:100%;display:flex;align-items:center;gap:8px;
  background:var(--glass);border:1px solid var(--gb-gold);
  border-radius:14px;padding:6px 6px 6px 16px;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  animation:fadeIn 0.18s ease;
}
.vault-type-input{
  flex:1;background:none;border:none;outline:none;
  color:var(--parchment);font-size:15px;min-height:40px;
  caret-color:var(--gold);font-family:'Outfit',sans-serif;
}
.vault-type-input::placeholder{color:var(--parch-faint)}
.big-mic-btn{
  width:110px;height:110px;border-radius:50%;border:none;
  background:var(--glass);
  border:2px solid var(--cyan-mid);
  color:var(--cyan);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 36px var(--cyan-dim),inset 0 0 20px rgba(125,249,255,0.05);
  transition:all 0.22s;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
}
.big-mic-btn:active{transform:scale(0.93)}
.big-mic-btn.listening{
  border-color:rgba(239,68,68,0.6);color:var(--danger);
  box-shadow:0 0 48px rgba(239,68,68,0.30),inset 0 0 22px rgba(239,68,68,0.08);
  animation:bigMicPulse 1.4s ease-in-out infinite;
}
@keyframes bigMicPulse{
  0%,100%{box-shadow:0 0 30px rgba(239,68,68,0.22),inset 0 0 14px rgba(239,68,68,0.06)}
  50%    {box-shadow:0 0 60px rgba(239,68,68,0.50),inset 0 0 26px rgba(239,68,68,0.12)}
}
@keyframes fadeIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.ai{animation:fadeIn 0.2s ease both}
</style>
</head>
<body>

<!-- MOTES -->
<div class="mote" style="background:var(--cyan);top:18%;left:11%;animation:m1 11s ease-in-out infinite"></div>
<div class="mote" style="background:var(--gold);top:33%;left:76%;animation:m2 14s ease-in-out infinite"></div>
<div class="mote" style="background:var(--cyan);top:54%;left:26%;animation:m3 10s ease-in-out infinite"></div>
<div class="mote" style="background:var(--gold);top:68%;left:85%;animation:m1 16s ease-in-out infinite reverse"></div>
<div class="mote" style="background:var(--violet);top:83%;left:47%;animation:m2 13s ease-in-out infinite"></div>

<!-- HEADER -->
<header class="header">
  <div class="header-row">
    <div class="header-title" id="h-title">The Vault</div>
    <div class="header-date" id="h-date"></div>
  </div>
  <div class="ns-banner" id="ns-banner" onclick="switchTab('projects')">
    <span class="ns-star">★</span>
    <div style="flex:1;min-width:0">
      <div class="ns-lbl">North Star</div>
      <div class="ns-txt" id="ns-banner-txt"></div>
    </div>
  </div>
</header>

<!-- PANELS -->
<section class="panel active" id="panel-vault"></section>
<section class="panel"        id="panel-plan"></section>
<section class="panel"        id="panel-projects"></section>
<section class="panel"        id="panel-tree"></section>

<!-- INPUT BAR -->
<div class="input-bar" id="input-bar">
  <div class="input-shell">
    <input id="main-input" autocomplete="off" spellcheck="false" placeholder="Capture a thought…">
    <button class="add-btn off" id="add-btn" onclick="handleAddOrMic()">
      <svg id="icon-plus" viewBox="0 0 24 24" style="display:none"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      <svg id="icon-mic" viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
    </button>
  </div>
</div>
<div class="mic-err" id="mic-err"></div>

<!-- VAULT CAPTURE BAR -->
<div id="vault-capture" style="display:none">
  <div id="vault-type-wrap" class="vault-type-wrap" style="display:none">
    <input id="vault-type-input" class="vault-type-input" autocomplete="off" spellcheck="false" placeholder="Type a thought… (#tag optional)">
    <button class="ibtn" onclick="vaultTypeSubmit()" style="color:var(--gold)">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12,5 19,12 12,19"/></svg>
    </button>
  </div>
  <div class="vault-mic-row">
    <button class="vault-kb-btn" id="vault-kb-btn" onclick="toggleVaultType()" title="Type instead">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><line x1="6" y1="10" x2="6" y2="10"/><line x1="10" y1="10" x2="10" y2="10"/><line x1="14" y1="10" x2="14" y2="10"/><line x1="18" y1="10" x2="18" y2="10"/><line x1="6" y1="14" x2="18" y2="14"/></svg>
    </button>
    <button class="vault-big-mic" id="vault-big-mic" onclick="toggleMic()">
      <svg viewBox="0 0 24 24" width="34" height="34" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    <div style="width:44px"></div><!-- spacer to center mic -->
  </div>
</div>

<!-- TAB BAR -->
<nav class="tab-bar">
  <button class="tab-btn active" id="tab-vault" onclick="switchTab('vault')">
    <div class="tab-icon"><svg viewBox="0 0 24 24"><polygon points="12,2 22,9 19,21 5,21 2,9"/></svg></div>
    <span class="tab-lbl">Vault</span>
    <span class="tab-badge" id="tb-vault"></span>
  </button>
  <button class="tab-btn" id="tab-plan" onclick="switchTab('plan')">
    <div class="tab-icon"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
    <span class="tab-lbl">Plan</span>
    <span class="tab-badge" id="tb-plan"></span>
  </button>
  <button class="tab-btn" id="tab-projects" onclick="switchTab('projects')">
    <div class="tab-icon"><svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg></div>
    <span class="tab-lbl">Projects</span>
    <span class="tab-badge" id="tb-projects"></span>
  </button>
  <button class="tab-btn" id="tab-tree" onclick="switchTab('tree')">
    <div class="tab-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="2"/><circle cx="5" cy="19" r="2"/><circle cx="19" cy="19" r="2"/><line x1="12" y1="7" x2="12" y2="13"/><line x1="12" y1="13" x2="5" y2="17"/><line x1="12" y1="13" x2="19" y2="17"/></svg></div>
    <span class="tab-lbl">Tree</span>
  </button>
</nav>

<!-- NEW DAY MODAL -->
<div id="nd-overlay">
  <div class="nd-card">
    <div class="nd-ey">☀ New Day</div>
    <div class="nd-body" id="nd-body"></div>
    <div class="nd-stats" id="nd-stats"></div>
    <div id="nd-actions"></div>
  </div>
</div>

<!-- NORTH STAR CONFIRM -->
<div id="ns-overlay">
  <div class="ns-card">
    <div class="ns-card-star">★</div>
    <div class="ns-card-title">Change North Star?</div>
    <div class="ns-card-body">Set <span class="ns-card-name" id="ns-new-name"></span> as your primary deliverable?</div>
    <div class="ns-btns">
      <button class="ns-no"  onclick="nsCancel()">Cancel</button>
      <button class="ns-do"  onclick="nsConfirm()">Set North Star</button>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════════════ */
const SKEY = 'jr-lumina-v2';
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const PRIO_NEXT = {low:'med',med:'high',high:'low'};
const PRIO_S = {
  low:  {bg:'var(--em-dim)',    border:'var(--emerald)',color:'#4ADE80',lbl:'LOW'},
  med:  {bg:'var(--gold-dim)',  border:'var(--gold)',   color:'#FBBF24',lbl:'MED'},
  high: {bg:'var(--danger-dim)',border:'var(--danger)', color:'#F87171',lbl:'HIGH'},
};

/* ═══════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════ */
let S = {};
const DEF = {
  items:[],projects:[],lastDate:null,tab:'vault',
  showDone:false,promoOpen:null,promoStage:null,
  northStar:null,tags:[],treeLayout:{},planWeek:'this',
};
// Runtime-only (not persisted)
let _exp = [];        // expanded project IDs
let _dayPick = null;  // active day picker item ID
let _childInput = null; // active child input project ID
let _pendingNS = null;
let _treeNodes = null;
let _treeDrag = null;
let _rAFPending = false;

/* ═══════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════ */
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
const todayStr = () => new Date().toISOString().slice(0,10);
const friendlyDate = () => {
  const d = new Date();
  return DAYS[d.getDay()]+' '+d.getDate()+' '+['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
};
const tagColor = tag => {
  if (!tag) return null;
  const cols = ['#7DF9FF','#D4AF37','#C080E0','#28A745','#F59E0B','#A8FBFF','#FB923C'];
  let h=0; for (const c of tag.toLowerCase()) h=(h*31+c.charCodeAt(0))&0xFFFFF;
  return cols[h%cols.length];
};
// Parse #tag from end of text: "do the thing #robotics" → {text:"do the thing",tag:"robotics"}
const parseTag = raw => {
  const m = raw.trim().match(/^([\s\S]+?)\s+#(\w+)$/);
  return m ? {text:m[1].trim(),tag:m[2].toLowerCase()} : {text:raw.trim(),tag:null};
};

/* ═══════════════════════════════════════════════
   FACTORIES
═══════════════════════════════════════════════ */
const makeItem = (text,status='vault',priority='med',opts={}) => ({
  id:uid(),text:text.trim(),created:new Date().toISOString(),
  status,priority,tag:opts.tag||null,parentProject:opts.parentProject||null,
  week:opts.week||null,day:opts.day??null,
});
const makeProject = (text,opts={}) => ({
  id:uid(),text:text.trim(),created:new Date().toISOString(),
  priority:opts.priority||'med',tag:opts.tag||null,children:[],links:[],
});

/* ═══════════════════════════════════════════════
   SAVE / LOAD / MIGRATE
═══════════════════════════════════════════════ */
function save() {
  try { localStorage.setItem(SKEY,JSON.stringify(S)); } catch(e){}
}
function load() {
  try {
    const raw = JSON.parse(localStorage.getItem(SKEY)||'null');
    if (!raw) { S={...DEF}; return; }
    S = {...DEF,...raw};
    S.items = (S.items||[]).map(i=>({
      ...i,
      tag:i.tag||null,
      parentProject:i.parentProject||null,
      week:i.week||(i.timeBlock&&i.status==='planned'?'this':null),
      day:i.day??null,
    }));
    S.projects = (S.projects||[]).map(p=>({
      ...p,
      tag:p.tag||null,
      children:p.children||[],
      links:p.links||[],
    }));
    if (!S.treeLayout) S.treeLayout={};
    if (!S.tags) S.tags=[];
    // Remove old keys
    delete S.stickies; delete S.activeBlock;
  } catch(e){ S={...DEF}; }
}

/* ═══════════════════════════════════════════════
   GEM SVG
═══════════════════════════════════════════════ */
const GEM = `<div class="gem-wrap"><svg viewBox="0 0 20 22" xmlns="http://www.w3.org/2000/svg">
  <defs><linearGradient id="gg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#7DF9FF"/><stop offset="100%" stop-color="#D4AF37"/>
  </linearGradient></defs>
  <polygon points="10,1 19,7 19,15 10,21 1,15 1,7" fill="none" stroke="url(#gg)" stroke-width="1.2" stroke-linejoin="round"/>
  <polygon points="10,1 19,7 10,8" fill="rgba(125,249,255,0.32)"/>
  <polygon points="10,1 1,7 10,8" fill="rgba(212,175,55,0.22)"/>
  <polygon points="19,7 19,15 10,14 10,8" fill="rgba(125,249,255,0.12)"/>
  <polygon points="1,7 1,15 10,14 10,8" fill="rgba(192,128,224,0.18)"/>
  <polygon points="19,15 10,21 10,14" fill="rgba(125,249,255,0.07)"/>
  <polygon points="1,15 10,21 10,14" fill="rgba(212,175,55,0.10)"/>
</svg></div>`;

/* ═══════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════ */
function prioBadge(p,id,fn) {
  const ps=PRIO_S[p]||PRIO_S.med;
  return `<button class="prio-btn p-${esc(p)}" onclick="${fn}('${esc(id)}')" style="background:${ps.bg};border-color:${ps.border};color:${ps.color}">${ps.lbl}</button>`;
}
function tagChip(tag) {
  if (!tag) return '';
  const c=tagColor(tag);
  return `<span class="tag" style="border-color:${c};color:${c};background:${c}22">${esc(tag)}</span>`;
}
function cyclePrioArr(arr,id) {
  return arr.map(x=>x.id===id?{...x,priority:PRIO_NEXT[x.priority]}:x);
}

/* ═══════════════════════════════════════════════
   RENDER SHELL
═══════════════════════════════════════════════ */
function renderAll() {
  renderHeader();
  if (S.tab==='vault')    renderVault();
  if (S.tab==='plan')     renderPlan();
  if (S.tab==='projects') renderProjects();
  if (S.tab==='tree')     renderTree();
  updateBadges();
  document.getElementById('input-bar').classList.toggle('hidden',S.tab==='tree'||S.tab==='vault');
  document.getElementById('vault-capture').style.display=S.tab==='vault'?'flex':'none';
  updateMicVisibility();
  const ph={vault:'Capture a thought… (or #tag it)',plan:'Add to plan…',projects:'New project… (#tag optional)'}[S.tab]||'';
  const inp=document.getElementById('main-input');
  if (inp) inp.placeholder=ph;
}

function renderHeader() {
  const titles={vault:'The Vault',plan:'Week Plan',projects:'Projects',tree:'Idea Tree'};
  document.getElementById('h-title').textContent=titles[S.tab]||'';
  document.getElementById('h-date').textContent=friendlyDate();
  const banner=document.getElementById('ns-banner');
  if (S.northStar) {
    const p=S.projects.find(p=>p.id===S.northStar);
    if (p) { banner.classList.add('visible'); document.getElementById('ns-banner-txt').textContent=p.text; }
    else { S.northStar=null; save(); banner.classList.remove('visible'); }
  } else { banner.classList.remove('visible'); }
}

function updateBadges() {
  const vn=S.items.filter(i=>i.status==='vault').length;
  const pn=S.items.filter(i=>i.status==='planned').length;
  const rn=S.projects.length;
  const bv=document.getElementById('tb-vault'),bp=document.getElementById('tb-plan'),br=document.getElementById('tb-projects');
  if (bv){ bv.textContent=vn; bv.style.display=vn?'':'none'; }
  if (bp){ bp.textContent=pn; bp.style.display=pn?'':'none'; }
  if (br){ br.textContent=rn; br.style.display=rn?'':'none'; }
}

/* ═══════════════════════════════════════════════
   VAULT
═══════════════════════════════════════════════ */
function renderVault() {
  const panel=document.getElementById('panel-vault');
  const items=S.items.filter(i=>i.status==='vault');

  if (!items.length) {
    panel.innerHTML=`<div class="empty ai" style="padding-bottom:180px">
      <div class="empty-icon">⬡</div>
      <div class="empty-title">The Vault awaits.</div>
      <div class="empty-sub">Tap the mic to speak — or the keyboard to type.<br>Use #tag to label on the fly. Promote when ready.</div>
    </div>`;
    return;
  }

  let html=`<div style="display:flex;justify-content:space-between;align-items:center;padding:0 0 12px">
    <span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--parch-muted)">${items.length} captured</span>
    <button onclick="clearVault()" style="background:none;border:none;color:var(--parch-muted);font-size:11px">Clear all</button>
  </div>`;
  items.forEach(item=>{
    const t=new Date(item.created).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    html+=`<div class="item-card ai" id="vc-${esc(item.id)}">
      <div class="item-body">
        <div class="item-text">${GEM}<span>${esc(item.text)}</span></div>
        <div class="item-meta"><span>${t}</span>${tagChip(item.tag)}</div>
        ${S.promoOpen===item.id?promoHTML(item.id):''}
      </div>
      <div class="item-actions">
        ${prioBadge(item.priority,item.id,'cycleVP')}
        <button class="ibtn go" onclick="togglePromo('${esc(item.id)}')">
          <svg viewBox="0 0 24 24"><polyline points="9,18 15,12 9,6"/></svg>
        </button>
        <button class="ibtn del" onclick="delItem('${esc(item.id)}')">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>`;
  });
  panel.innerHTML=`<div style="padding-bottom:180px">${html}</div>`;
}

function promoHTML(id) {
  if (S.promoStage==='plist') {
    let html=`<div class="promo-inline"><span class="promo-lbl">Attach to project →</span>`;
    if (!S.projects.length) html+=`<span style="font-size:12px;color:var(--parch-muted)">No projects yet.</span>`;
    else S.projects.forEach(p=>{
      html+=`<button class="promo-opt" onclick="attachToProj('${esc(id)}','${esc(p.id)}')">${esc(p.text.slice(0,28)+(p.text.length>28?'…':''))}</button>`;
    });
    html+=`<button class="promo-opt" onclick="promoNewProj('${esc(id)}')">＋ New Project</button>`;
    return html+'</div>';
  }
  return `<div class="promo-inline">
    <span class="promo-lbl">Send to →</span>
    <button class="promo-opt" onclick="promoToWeek('${esc(id)}','this')">📅 This Week</button>
    <button class="promo-opt" onclick="promoToWeek('${esc(id)}','next')">📅 Next Week</button>
    <button class="promo-opt" onclick="promoNewProj('${esc(id)}')">🗂 New Project</button>
    <button class="promo-opt" onclick="showPList('${esc(id)}')">📎 Attach to Project</button>
  </div>`;
}

function togglePromo(id) {
  S.promoOpen=S.promoOpen===id?null:id;
  S.promoStage=S.promoOpen?'dest':null;
  renderVault();
}
function promoToWeek(id,week) {
  S.items=S.items.map(i=>i.id===id?{...i,status:'planned',week,day:null}:i);
  S.promoOpen=null; S.promoStage=null; save(); switchTab('plan');
}
function promoNewProj(id) {
  const item=S.items.find(i=>i.id===id); if(!item)return;
  S.projects.push(makeProject(item.text,{tag:item.tag}));
  S.items=S.items.filter(i=>i.id!==id);
  S.promoOpen=null; S.promoStage=null; save(); switchTab('projects');
}
function showPList(id) { S.promoStage='plist'; renderVault(); }
function attachToProj(itemId,projId) {
  const proj=S.projects.find(p=>p.id===projId); if(!proj)return;
  S.items=S.items.map(i=>i.id===itemId?{...i,status:'child',parentProject:projId}:i);
  if (!proj.children.includes(itemId)) proj.children.push(itemId);
  S.promoOpen=null; S.promoStage=null; save(); switchTab('projects');
}
function clearVault() { S.items=S.items.filter(i=>i.status!=='vault'); save(); renderAll(); }
function delItem(id)   { S.items=S.items.filter(i=>i.id!==id); save(); renderAll(); }
function cycleVP(id)   { S.items=cyclePrioArr(S.items,id); save(); renderVault(); updateBadges(); }

/* ═══════════════════════════════════════════════
   PLAN
═══════════════════════════════════════════════ */
function renderPlan() {
  const panel=document.getElementById('panel-plan');
  const wkItems=S.items.filter(i=>i.status==='planned'&&i.week===S.planWeek);
  const done=S.items.filter(i=>i.status==='done');

  let html=`<div class="week-toggle">
    <button class="week-btn ${S.planWeek==='this'?'wk-active':''}" onclick="setPlanWeek('this')">This Week</button>
    <button class="week-btn ${S.planWeek==='next'?'wk-active':''}" onclick="setPlanWeek('next')">Next Week</button>
  </div>`;

  if (!wkItems.length&&!done.length) {
    html+=`<div class="empty">
      <div class="empty-icon">📅</div>
      <div class="empty-title">Nothing planned yet.</div>
      <div class="empty-sub">Promote from Vault or type below.</div>
    </div>`; panel.innerHTML=html; return;
  }

  const unassigned=wkItems.filter(i=>i.day===null||i.day===undefined);
  const byDay=Array.from({length:7},(_,d)=>wkItems.filter(i=>i.day===d));

  if (unassigned.length) {
    html+=`<div class="slabel">Anytime this week</div>`;
    unassigned.forEach(i=>{ html+=taskCardHTML(i); });
  }
  DAYS.forEach((d,idx)=>{
    if (byDay[idx].length) {
      html+=`<div class="slabel">${d}</div>`;
      byDay[idx].forEach(i=>{ html+=taskCardHTML(i); });
    }
  });

  if (done.length) {
    html+=`<div style="display:flex;align-items:center;gap:8px;padding:12px 0 0;cursor:pointer" onclick="toggleDone()">
      <span style="color:#4ADE80;font-size:12px">✓</span>
      <span style="color:var(--parch-muted);font-size:12px">${done.length} completed</span>
      <span style="color:var(--parch-faint);font-size:10px;margin-left:4px">${S.showDone?'▲':'▼'}</span>
      <span style="margin-left:auto;font-size:11px;color:var(--parch-muted)" onclick="event.stopPropagation();clearDone()">Clear</span>
    </div>`;
    if (S.showDone) done.forEach(i=>{
      html+=`<div class="task-card is-done">
        <button class="check-ring ticked" onclick="undone('${esc(i.id)}')">✓</button>
        <div class="task-body"><div class="task-text">${esc(i.text)}</div></div>
      </div>`;
    });
  }
  panel.innerHTML=html;
}

function taskCardHTML(item) {
  const ps=PRIO_S[item.priority]||PRIO_S.med;
  const dayLbl=item.day!==null&&item.day!==undefined?DAYS[item.day]:'—';
  const showPick=_dayPick===item.id;
  return `<div class="task-card" style="border-left:3px solid ${ps.border}" id="tc-${esc(item.id)}">
    <button class="check-ring" onclick="markDone('${esc(item.id)}')"></button>
    <div class="task-body">
      <div class="task-text">${esc(item.text)}</div>
      <div class="task-footer">
        <button class="day-pill" onclick="toggleDayPick('${esc(item.id)}')">${esc(dayLbl)}</button>
        ${tagChip(item.tag)}
      </div>
      ${showPick?dayPickHTML(item.id,item.day):''}
    </div>
    ${prioBadge(item.priority,item.id,'cyclePP')}
    <button class="ibtn del" onclick="delItem('${esc(item.id)}')">
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>`;
}

function dayPickHTML(id,cur) {
  const todayDow = new Date().getDay(); // 0=Sun
  let h=`<div class="day-picker">`;
  h+=`<button class="day-opt${cur===null||cur===undefined?' day-sel':''}" onclick="setDay('${esc(id)}',null,null)">Any</button>`;
  DAYS.forEach((d,i)=>{
    // A day is "past this week" if it's before today's DOW. Sunday=0 means all Mon-Sat are past.
    const isPast = i < todayDow || todayDow === 0 && i !== 0;
    const isSel = cur===i;
    h+=`<button class="day-opt${isSel?' day-sel':''}${isPast&&!isSel?' day-past':''}"
      onclick="setDay('${esc(id)}',${i},${isPast?true:false})">${d}${isPast?'*':''}</button>`;
  });
  h+=`<div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--parch-faint);width:100%;padding-top:4px">* past days auto-assigned to next week</div>`;
  return h+'</div>';
}

function toggleDayPick(id){ _dayPick=_dayPick===id?null:id; renderPlan(); }
function setDay(id,day,isPast){
  // If day has already passed this week, bump to next week automatically
  const newWeek = isPast ? 'next' : S.planWeek;
  S.items=S.items.map(i=>i.id===id?{...i,day,week:newWeek}:i);
  _dayPick=null; save(); renderPlan();
}
function setPlanWeek(w){ S.planWeek=w; renderPlan(); }
function markDone(id){ S.items=S.items.map(i=>i.id===id?{...i,status:'done'}:i); save(); renderAll(); }
function undone(id)  { S.items=S.items.map(i=>i.id===id?{...i,status:'planned',week:S.planWeek}:i); save(); renderAll(); }
function toggleDone(){ S.showDone=!S.showDone; renderPlan(); }
function clearDone() { S.items=S.items.filter(i=>i.status!=='done'); save(); renderAll(); }
function cyclePP(id) { S.items=cyclePrioArr(S.items,id); save(); renderPlan(); }

   PROJECTS
═══════════════════════════════════════════════ */
function renderProjects() {
  const panel=document.getElementById('panel-projects');
  if (!S.projects.length) {
    panel.innerHTML=`<div class="empty ai">
      <div class="empty-icon">🗂</div>
      <div class="empty-title">No projects yet.</div>
      <div class="empty-sub">Add ongoing work below.<br>Type project name, promote from Vault, or attach Vault items as tasks.</div>
    </div>`; return;
  }
  const sorted=[...S.projects].sort((a,b)=>a.id===S.northStar?-1:b.id===S.northStar?1:0);
  let html=`<div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--parch-muted);padding:4px 0 12px">
    ${S.projects.length} project${S.projects.length!==1?'s':''}${S.northStar?' · ★ active':''}
  </div>`;

  sorted.forEach(proj=>{
    const isNS=proj.id===S.northStar;
    const isExp=_exp.includes(proj.id);
    const children=S.items.filter(i=>i.parentProject===proj.id);
    const doneCh=children.filter(i=>i.status==='done').length;
    const pct=children.length?Math.round(doneCh/children.length*100):0;
    const dt=new Date(proj.created).toLocaleDateString('en-GB',{day:'numeric',month:'short'});
    const isCI=_childInput===proj.id;

    html+=`<div class="proj-card ai ${isNS?'is-ns':''}">
      <div class="proj-header">
        <button class="expand-btn ${isExp?'open':''}" onclick="toggleExp('${esc(proj.id)}')">▶</button>
        <div class="proj-body" onclick="toggleExp('${esc(proj.id)}')">
          <div class="proj-title">${isNS?'★ ':''}${esc(proj.text)}</div>
          <div class="proj-meta">
            <span>${dt}</span>${tagChip(proj.tag)}
            ${children.length?`<span style="color:var(--parch-faint)">${doneCh}/${children.length} tasks</span>`:''}
          </div>
        </div>
        <div class="proj-actions">
          ${prioBadge(proj.priority,proj.id,'cycleProjP')}
          <button class="ibtn" onclick="toggleNS('${esc(proj.id)}')" title="${isNS?'Unpin North Star':'Set as North Star'}" style="${isNS?'color:var(--gold);filter:drop-shadow(0 0 4px rgba(212,175,55,0.6))':''}">
            <svg viewBox="0 0 24 24"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>
          </button>
          <button class="ibtn del" onclick="delProj('${esc(proj.id)}')">
            <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>`;

    if (children.length) {
      html+=`<div class="proj-prog">
        <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
        <div class="prog-label">${pct}% complete</div>
      </div>`;
    }

    if (isExp) {
      html+=`<div class="children">`;
      if (!children.length&&!isCI) {
        html+=`<div style="font-size:12px;color:var(--parch-faint);padding:6px 0">No tasks yet.</div>`;
      }
      children.forEach(ch=>{
        const isDone=ch.status==='done';
        html+=`<div class="child-row">
          <button class="check-ring ${isDone?'ticked':''}" onclick="toggleChildDone('${esc(ch.id)}')">${isDone?'✓':''}</button>
          <span class="child-text ${isDone?'child-done-text':''}">${esc(ch.text)}</span>
          <button class="ibtn" title="Add to Plan" onclick="childToPlan('${esc(ch.id)}')" style="opacity:0.5">
            <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          </button>
          <button class="ibtn del" onclick="delItem('${esc(ch.id)}')">
            <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>`;
      });
      html+=`<button class="child-add-btn" onclick="openChildInput('${esc(proj.id)}')">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add task
      </button>`;
      if (isCI) {
        html+=`<div class="child-input-wrap">
          <input class="child-input" id="ci-${esc(proj.id)}" placeholder="Task… (#tag optional)"
            onkeydown="childKey(event,'${esc(proj.id)}')" onblur="closeChildInput()">
        </div>`;
      }
      html+=`</div>`;
    }
    html+=`</div>`;
  });
  panel.innerHTML=html;
  if (_childInput) {
    const ci=document.getElementById('ci-'+_childInput);
    if (ci) setTimeout(()=>ci.focus(),40);
  }
}

function toggleExp(id){ const i=_exp.indexOf(id); if(i>=0)_exp.splice(i,1); else _exp.push(id); renderProjects(); }
function openChildInput(id){ _childInput=id; if(!_exp.includes(id))_exp.push(id); renderProjects(); }
function closeChildInput(){ setTimeout(()=>{ _childInput=null; },200); }
function childKey(e,projId){
  if (e.key==='Enter') {
    const ci=document.getElementById('ci-'+projId);
    if (!ci||!ci.value.trim()) { _childInput=null; renderProjects(); return; }
    const {text,tag}=parseTag(ci.value);
    const item=makeItem(text,'child','med',{parentProject:projId,tag});
    S.items.push(item);
    const proj=S.projects.find(p=>p.id===projId);
    if (proj&&!proj.children.includes(item.id)) proj.children.push(item.id);
    if (tag) ensureTag(tag);
    save(); renderProjects();
    // Keep input open for next task
    _childInput=projId;
    const ci2=document.getElementById('ci-'+projId);
    if (ci2) { ci2.value=''; setTimeout(()=>ci2.focus(),40); }
  }
  if (e.key==='Escape') { _childInput=null; renderProjects(); }
}
function toggleChildDone(id){
  S.items=S.items.map(i=>i.id===id?{...i,status:i.status==='done'?'child':'done'}:i);
  save(); renderProjects();
}
function childToPlan(id){ S.items=S.items.map(i=>i.id===id?{...i,status:'planned',week:S.planWeek,day:null}:i); save(); switchTab('plan'); }
function delProj(id){
  S.items=S.items.filter(i=>i.parentProject!==id);
  S.projects=S.projects.filter(p=>p.id!==id);
  S.projects.forEach(p=>{p.links=p.links.filter(l=>l!==id);});
  if(S.northStar===id)S.northStar=null;
  _exp=_exp.filter(x=>x!==id);
  delete S.treeLayout[id];
  save(); renderAll();
}
function cycleProjP(id){ S.projects=cyclePrioArr(S.projects,id); save(); renderProjects(); }
function ensureTag(t){ if(t&&!S.tags.includes(t)){S.tags.push(t);} }

   NORTH STAR

function toggleNS(id){
  if (S.northStar===id){ S.northStar=null; save(); renderAll(); return; }
  if (S.northStar){
    _pendingNS=id;
    const p=S.projects.find(p=>p.id===id);

  }

function nsConfirm(){ if(_pendingNS){S.northStar=_pendingNS;_pendingNS=null;save();} document.getElementById('ns-overlay').classList.remove('open'); renderAll(); }
function nsCancel(){ _pendingNS=null; document.getElementById('ns-overlay').classList.remove('open'); }

/* ═══════════════════════════════════════════════
   TREE
═══════════════════════════════════════════════ */
function renderTree() {
  const panel=document.getElementById('panel-tree');
  if (!S.projects.length) {
    panel.innerHTML=`<div class="tree-bar"><span class="tree-lbl">Idea landscape</span></div>
      <div class="empty ai" style="padding-top:80px">
        <div class="empty-icon">🕸</div>
        <div class="empty-title">No projects to map.</div>
        <div class="empty-sub">Add projects and they'll appear here<br>as an interactive graph.</div>
      </div>`; return;
  }

  const W=Math.min(window.innerWidth,480);
  const H=360;

  // Init/restore node positions
  const nodes=S.projects.map(p=>{
    const sv=S.treeLayout[p.id];
    return {
      ...p,
      x:sv?.x??(80+Math.random()*(W-160)),
      y:sv?.y??(50+Math.random()*(H-100)),
      vx:0,vy:0,
    };
  });

  // Build edges
  const edges=[];
  S.projects.forEach(p=>{
    (p.links||[]).forEach(lid=>{
      if(nodes.find(n=>n.id===lid)) edges.push({s:p.id,t:lid});
    });
  });

  // Force simulation
  if (!S.treeLayout||Object.keys(S.treeLayout).length===0) {
    runForce(nodes,edges,W,H,80);
  }

  _treeNodes=nodes;
  nodes.forEach(n=>{ S.treeLayout[n.id]={x:n.x,y:n.y}; });
  save();

  panel.innerHTML=`<div class="tree-bar">
    <span class="tree-lbl">${S.projects.length} project${S.projects.length!==1?'s':''}</span>
    <span class="tree-lbl">tap=open · drag=move</span>
  </div>${buildTreeSVG(nodes,edges,W,H)}${buildLegend()}`;

  attachTreeEvents(W,H,edges);
}

function runForce(nodes,edges,W,H,iters){
  for(let k=0;k<iters;k++){
    for(let i=0;i<nodes.length;i++) for(let j=i+1;j<nodes.length;j++){
      const a=nodes[i],b=nodes[j];
      const dx=b.x-a.x,dy=b.y-a.y;
      const d=Math.max(Math.sqrt(dx*dx+dy*dy),1);
      const f=7000/(d*d);
      const fx=f*dx/d,fy=f*dy/d;
      a.vx-=fx;a.vy-=fy;b.vx+=fx;b.vy+=fy;
    }
    edges.forEach(({s,t})=>{
      const a=nodes.find(n=>n.id===s),b=nodes.find(n=>n.id===t);
      if(!a||!b)return;
      const dx=b.x-a.x,dy=b.y-a.y;
      const d=Math.sqrt(dx*dx+dy*dy)||1;
      const f=(d-150)*0.04;
      a.vx+=f*dx/d;a.vy+=f*dy/d;b.vx-=f*dx/d;b.vy-=f*dy/d;
    });
    nodes.forEach(n=>{
      n.vx+=(W/2-n.x)*0.007; n.vy+=(H/2-n.y)*0.007;
      n.x+=n.vx*0.5; n.y+=n.vy*0.5;
      n.vx*=0.78; n.vy*=0.78;
      n.x=Math.max(38,Math.min(W-38,n.x));
      n.y=Math.max(34,Math.min(H-34,n.y));
    });
  }
}

function buildTreeSVG(nodes,edges,W,H){
  let svg=`<svg id="tree-svg" viewBox="0 0 ${W} ${H}" style="height:${H}px">
    <defs>
      <filter id="glo"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <filter id="nsGlo"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>`;

  // Edges
  edges.forEach(({s,t})=>{
    const a=nodes.find(n=>n.id===s),b=nodes.find(n=>n.id===t);
    if(a&&b) svg+=`<line x1="${a.x.toFixed(1)}" y1="${a.y.toFixed(1)}" x2="${b.x.toFixed(1)}" y2="${b.y.toFixed(1)}" stroke="rgba(125,249,255,0.22)" stroke-width="1.5" stroke-dasharray="5,4"/>`;
  });

  // Nodes
  nodes.forEach(n=>{
    const isNS=n.id===S.northStar;
    const tc=tagColor(n.tag)||'#7DF9FF';
    const r=isNS?34:26;
    const ch=S.items.filter(i=>i.parentProject===n.id);
    const done=ch.filter(i=>i.status==='done').length;
    const x=n.x.toFixed(1),y=n.y.toFixed(1);

    svg+=`<g class="tn" data-id="${n.id}" style="cursor:pointer">`;
    if(isNS) svg+=`<circle cx="${x}" cy="${y}" r="${r+8}" fill="rgba(212,175,55,0.10)" stroke="rgba(212,175,55,0.30)" stroke-width="1" filter="url(#nsGlo)"/>`;
    svg+=`<circle cx="${x}" cy="${y}" r="${r}" fill="rgba(16,40,80,0.90)" stroke="${isNS?'#D4AF37':tc}" stroke-width="${isNS?2.5:1.5}" filter="url(#glo)"/>`;

    // Progress arc
    if(ch.length>0){
      const pct=done/ch.length;
      const circ=2*Math.PI*r;
      const dash=pct*circ;
      svg+=`<circle cx="${x}" cy="${y}" r="${r}" fill="none" stroke="${tc}" stroke-width="3" stroke-dasharray="${dash.toFixed(2)} ${circ.toFixed(2)}" stroke-dashoffset="${(circ/4).toFixed(2)}" opacity="0.45" transform="rotate(-90 ${x} ${y})"/>`;
    }

    // Center glyph
    if(isNS){
      svg+=`<text x="${x}" y="${(n.y+5).toFixed(1)}" text-anchor="middle" fill="#D4AF37" font-size="14">★</text>`;
    } else {
      const letter=n.text[0]?.toUpperCase()||'?';
      svg+=`<text x="${x}" y="${(n.y+6).toFixed(1)}" text-anchor="middle" fill="${tc}" font-family="Playfair Display,serif" font-size="18" font-weight="600">${esc(letter)}</text>`;
    }

    // Label
    const lbl=n.text.length>16?n.text.slice(0,14)+'…':n.text;
    svg+=`<text x="${x}" y="${(n.y+r+15).toFixed(1)}" text-anchor="middle" fill="${isNS?'#D4AF37':'rgba(245,245,220,0.70)'}" font-family="JetBrains Mono,monospace" font-size="9" font-weight="${isNS?'600':'400'}">${esc(lbl)}</text>`;

    // Child count badge
    if(ch.length>0){
      svg+=`<text x="${(n.x+r-4).toFixed(1)}" y="${(n.y-r+10).toFixed(1)}" text-anchor="middle" fill="rgba(125,249,255,0.8)" font-family="JetBrains Mono,monospace" font-size="8">${ch.length}</text>`;
    }
    svg+=`</g>`;
  });

  svg+=`</svg>`;
  return svg;
}

function buildLegend(){
  const tags=[...new Set(S.projects.filter(p=>p.tag).map(p=>p.tag))];
  if (!tags.length) return '';
  let h=`<div class="tree-legend">`;
  tags.forEach(t=>{ h+=`<div class="leg-item"><div class="leg-dot" style="background:${tagColor(t)}"></div>${esc(t)}</div>`; });
  return h+`</div>`;
}

function attachTreeEvents(W,H,edges){
  const svg=document.getElementById('tree-svg');
  if(!svg||!_treeNodes)return;

  function getPos(e){
    const r=svg.getBoundingClientRect();
    const sx=W/r.width,sy=H/r.height;
    const src=e.touches?e.touches[0]:e;
    return{x:(src.clientX-r.left)*sx,y:(src.clientY-r.top)*sy};
  }

  svg.addEventListener('mousedown',onStart);
  svg.addEventListener('touchstart',onStart,{passive:false});

  function onStart(e){
    const el=e.target.closest('.tn');
    if(!el)return;
    const id=el.dataset.id;
    const node=_treeNodes.find(n=>n.id===id);
    if(!node)return;
    e.preventDefault();
    const p=getPos(e);
    _treeDrag={id,node,ox:p.x-node.x,oy:p.y-node.y,moved:false};
    svg.addEventListener('mousemove',onMove);
    svg.addEventListener('mouseup',onEnd);
    svg.addEventListener('touchmove',onMove,{passive:false});
    svg.addEventListener('touchend',onEnd);
  }
  function onMove(e){
    if(!_treeDrag)return;
    e.preventDefault();
    const p=getPos(e);
    const nx=Math.max(38,Math.min(W-38,p.x-_treeDrag.ox));
    const ny=Math.max(34,Math.min(H-34,p.y-_treeDrag.oy));
    const moved=Math.abs(nx-_treeDrag.node.x)>3||Math.abs(ny-_treeDrag.node.y)>3;
    if(moved)_treeDrag.moved=true;
    _treeDrag.node.x=nx;_treeDrag.node.y=ny;
    if(!_rAFPending){
      _rAFPending=true;
      requestAnimationFrame(()=>{
        const s=document.getElementById('tree-svg');
        if(s&&_treeNodes){
          const newSVG=buildTreeSVG(_treeNodes,edges,W,H);
          const tmp=document.createElement('div');
          tmp.innerHTML=newSVG;
          const ns=tmp.firstElementChild;
          if(ns){ s.replaceWith(ns); attachTreeEvents(W,H,edges); }
        }
        _rAFPending=false;
      });
    }
  }
  function onEnd(){
    if(!_treeDrag)return;
    if(_treeDrag.moved){
      _treeNodes.forEach(n=>{ S.treeLayout[n.id]={x:n.x,y:n.y}; });
      save();
    } else {
      // Tap → open in projects
      const id=_treeDrag.id;
      if(!_exp.includes(id))_exp.push(id);
      switchTab('projects');
    }
    _treeDrag=null;
    svg.removeEventListener('mousemove',onMove);
    svg.removeEventListener('mouseup',onEnd);
    svg.removeEventListener('touchmove',onMove);
    svg.removeEventListener('touchend',onEnd);
  }
}

/* ═══════════════════════════════════════════════
   SPEECH
═══════════════════════════════════════════════ */
let _rec=null,_recOn=false;
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
if(SR){
  try{
    _rec=new SR();
    _rec.continuous=false;
    _rec.interimResults=true;
    _rec.lang='en-US';
    _rec.onresult=e=>{
      const txt=Array.from(e.results).map(r=>r[0].transcript).join('');
      const isFinal=e.results[e.results.length-1].isFinal;
      if(S.tab==='vault'){
        // Show in type input as preview; auto-submit on final
        if(!_vaultTypeOpen) toggleVaultType();
        const vi=document.getElementById('vault-type-input');
        if(vi) vi.value=txt;
        if(isFinal&&txt.trim()){
          setTimeout(()=>{ vaultTypeSubmit(); if(_vaultTypeOpen)toggleVaultType(); },300);
        }
      } else {
        const inp=document.getElementById('main-input');
        if(inp){ inp.value=txt; syncBtn(); }
      }
    };
    _rec.onend=()=>{ _recOn=false; syncBtn(); syncBigMic(); };
    _rec.onerror=ev=>{
      _recOn=false; syncBtn(); syncBigMic();
      const msgs={
        'not-allowed':'Mic access denied. Enable it in browser settings.',
        'no-speech':'No speech detected. Try again.',
        'network':'Network error. Check connection.',
      };
      showMicErr(msgs[ev.error]||'Voice capture failed. Use text input.');
    };
  }catch{ _rec=null; }
}

function toggleMic(){
  if(!_rec){ showMicErr('Voice not supported. Use Chrome.'); return; }
  if(_recOn){ _rec.stop(); }
  else{ try{ _rec.start();_recOn=true;syncBtn();syncBigMic();hideMicErr(); }catch(e){_recOn=false;syncBtn();syncBigMic();} }
}

// Sync the single add/mic button state
function syncBtn(){
  const inp=document.getElementById('main-input');
  const btn=document.getElementById('add-btn');
  const plus=document.getElementById('icon-plus');
  const mic=document.getElementById('icon-mic');
  if(!btn)return;
  const hasText=inp&&inp.value.trim().length>0;
  const micAvail=!!_rec;
  const showOnThisTab=(S.tab==='vault'||S.tab==='projects');

  if(_recOn){
    btn.className='add-btn listening';
    if(plus)plus.style.display='none';
    if(mic)mic.style.display='';
    return;
  }
  if(hasText){
    btn.className='add-btn rdy';
    if(plus)plus.style.display='';
    if(mic)mic.style.display='none';
    return;
  }
  // Empty input
  if(micAvail&&showOnThisTab){
    btn.className='add-btn off';
    if(plus)plus.style.display='none';
    if(mic)mic.style.display='';
  } else if(S.tab==='plan'){
    btn.className='add-btn no-mic';
    if(plus)plus.style.display='';
    if(mic)mic.style.display='none';
  } else {
    btn.className='add-btn off';
    if(plus)plus.style.display='none';
    if(mic)mic.style.display='';
  }
}

function syncBigMic(){
  const b=document.getElementById('vault-big-mic');
  if(b) b.classList.toggle('listening',_recOn);
}

let _vaultTypeOpen=false;
function toggleVaultType(){
  _vaultTypeOpen=!_vaultTypeOpen;
  const wrap=document.getElementById('vault-type-wrap');
  const kb=document.getElementById('vault-kb-btn');
  if(wrap) wrap.style.display=_vaultTypeOpen?'flex':'none';
  if(kb) kb.classList.toggle('active',_vaultTypeOpen);
  if(_vaultTypeOpen){
    const inp=document.getElementById('vault-type-input');
    if(inp) setTimeout(()=>inp.focus(),60);
  }
}
function vaultTypeSubmit(){
  const inp=document.getElementById('vault-type-input');
  if(!inp||!inp.value.trim())return;
  const {text,tag}=parseTag(inp.value.trim());
  if(tag)ensureTag(tag);
  S.items.push(makeItem(text,'vault','med',{tag}));
  inp.value='';
  save();renderVault();
}
// Allow Enter key in vault type input
document.addEventListener('keydown',e=>{
  if(e.target&&e.target.id==='vault-type-input'&&e.key==='Enter'){
    e.preventDefault();vaultTypeSubmit();
  }
});

function updateMicVisibility(){ syncBtn(); syncBigMic(); }

let _errT=null;
function showMicErr(msg){
  const el=document.getElementById('mic-err');
  if(el){el.textContent=msg;el.classList.add('show');}
  clearTimeout(_errT);_errT=setTimeout(hideMicErr,4200);
}
function hideMicErr(){ const el=document.getElementById('mic-err');if(el)el.classList.remove('show'); }

/* ═══════════════════════════════════════════════
   INPUT
═══════════════════════════════════════════════ */
window.addEventListener('DOMContentLoaded',()=>{
  const inp=document.getElementById('main-input');
  inp.addEventListener('input',syncBtn);
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleAddOrMic();} });
  syncBtn();
});

function handleAddOrMic(){
  const inp=document.getElementById('main-input');
  if(inp&&inp.value.trim()){
    handleAdd();
  } else {
    toggleMic();
  }
}

function handleAdd(){
  const inp=document.getElementById('main-input');
  const raw=inp.value.trim();if(!raw)return;
  const {text,tag}=parseTag(raw);
  if(tag)ensureTag(tag);
  if(S.tab==='projects'){
    S.projects.push(makeProject(text,{tag}));
  } else if(S.tab==='plan'){
    S.items.push(makeItem(text,'planned','med',{week:S.planWeek,day:null,tag}));
  } else {
    S.items.push(makeItem(text,'vault','med',{tag}));
  }
  if(_recOn&&_rec)_rec.stop();
  inp.value='';syncBtn();
  save();renderAll();
}

/* ═══════════════════════════════════════════════
   NAV
═══════════════════════════════════════════════ */
function switchTab(name){
  S.tab=name;S.promoOpen=null;S.promoStage=null;_dayPick=null;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.id==='tab-'+name));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==='panel-'+name));
  renderAll();
}

/* ═══════════════════════════════════════════════
   NEW DAY
═══════════════════════════════════════════════ */
function checkNewDay(){
  const today=todayStr();
  if(S.lastDate===today)return;
  if(!S.lastDate&&!S.items.length){S.lastDate=today;save();return;}
  const done=S.items.filter(i=>i.status==='done').length;
  const undone=S.items.filter(i=>i.status==='planned');
  const vault=S.items.filter(i=>i.status==='vault').length;
  document.getElementById('nd-body').innerHTML=S.lastDate
    ?`Yesterday was <strong>${S.lastDate}</strong>. New day.`
    :`First run. Let's get oriented.`;
  document.getElementById('nd-stats').innerHTML=`
    <div class="nd-stat"><div class="nd-n">${done}</div><div class="nd-l">Done</div></div>
    <div class="nd-stat"><div class="nd-n">${undone.length}</div><div class="nd-l">Unfinished</div></div>
    <div class="nd-stat"><div class="nd-n">${vault}</div><div class="nd-l">In Vault</div></div>`;
  const acts=document.getElementById('nd-actions');
  acts.innerHTML='';
  const b1=document.createElement('button');
  b1.className='nd-btn nd-primary';b1.textContent='Carry Forward';
  b1.onclick=()=>ndDo('carry',undone,today);acts.appendChild(b1);
  if(undone.length){
    const b2=document.createElement('button');
    b2.className='nd-btn nd-secondary';
    b2.textContent=`Fresh Start — Drop ${undone.length} Unfinished`;
    b2.onclick=()=>ndDo('drop',undone,today);acts.appendChild(b2);
  }
  document.getElementById('nd-overlay').classList.add('open');
}
function ndDo(mode,undone,today){
  S.items=S.items.filter(i=>i.status!=='done');
  if(mode==='drop')S.items=S.items.filter(i=>i.status!=='planned');
  S.lastDate=today;save();
  document.getElementById('nd-overlay').classList.remove('open');
  renderAll();
}

/* ═══════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════ */
load();
S.tab = S.tab || 'vault'; // default to vault on fresh install
checkNewDay();
switchTab(S.tab);  // syncs panel visibility + tab active classes
if('serviceWorker'in navigator){
  window.addEventListener('load',()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); });
}
</script>
