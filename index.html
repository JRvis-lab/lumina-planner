<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Planner</title>
    <style>
        /* Add animations for the listening state */
        .listening {
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <h1>Lumina Planner</h1>
    <button id="micButton" title="Click to start voice capture">🎤</button>
    <div id="feedback"></div>
    <script>
        const micButton = document.getElementById('micButton');
        const feedback = document.getElementById('feedback');
        let recognition;

        function initSpeechRecognition() {
            if ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window) {
                recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
                recognition.continuous = true;
                recognition.interimResults = true;

                recognition.onstart = function() {
                    micButton.classList.add('listening');
                    feedback.innerHTML = 'Listening...';
                };

                recognition.onresult = function(event) {
                    let transcript = '';
                    for (let i = event.resultIndex; i < event.results.length; ++i) {
                        transcript += event.results[i][0].transcript;
                    }
                    autoSave(transcript);  // Auto-save captured content
                };

                recognition.onerror = function(event) {
                    feedback.innerHTML = 'Error occurred in recognition: ' + event.error;
                    // User-friendly prompts for errors
                    if (event.error === 'not-allowed') {
                        alert('Microphone access denied. Please allow microphone permissions in your browser settings.');
                    }
                };

                recognition.onend = function() {
                    micButton.classList.remove('listening');
                    feedback.innerHTML = ''; // Clear feedback on end
                };
            } else {
                feedback.innerHTML = 'Speech Recognition not supported in this browser.';
                alert('Please use a supported browser or enable the microphone.');
            }
        }

        function autoSave(content) {
            // Implement auto-save feature (e.g., save to local storage or server)
            localStorage.setItem('capturedContent', content);
        }

        micButton.addEventListener('click', () => {
            if (recognition) {
                recognition.start();
            }
        });

        initSpeechRecognition();
    </script>
</body>
</html>
